version: '3.9'

# Local development stack — run with:
#   docker compose -f docker-compose.local.yml up --build
# App: http://localhost:5000
# API health: http://localhost:5000/health

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=decypher;Username=decypher;Password=localpass
      - Jwt__Key=local-dev-jwt-secret-key-minimum-48-characters-long-here
      - AllowedOrigins=http://localhost:5000
      - Notifications__Provider=Stub
      - OpenAI__ApiKey=
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decypher
      POSTGRES_USER: decypher
      POSTGRES_PASSWORD: localpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decypher"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local:

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: decypher-db
    environment:
      POSTGRES_DB: decypher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - decypher-net

  # .NET 8 app serving both Angular frontend and API on one public port
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: decypher-app
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=decypher;Username=postgres;Password=${DB_PASSWORD:-postgres};SSL Mode=Disable"
      Jwt__Key: ${JWT_KEY:-your-super-secret-key-change-in-production-minimum-48-characters-long}
      Jwt__Issuer: Decypher
      Jwt__Audience: DecypherUsers
      Jwt__ExpiryMinutes: 1440
      AllowedOrigins: "http://localhost:5000,https://${DOMAIN:-localhost}"
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: gpt-4
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - decypher-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # NGINX Reverse Proxy (Optional but recommended for production)
  nginx:
    image: nginx:alpine
    container_name: decypher-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - decypher-net

volumes:
  postgres_data:

networks:
  decypher-net:
    driver: bridge

name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  SERVICE_NAME: decypher-api

jobs:
  # ── 1. Run .NET tests ──────────────────────────────────────────
  test:
    name: Test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: |
          cd Decypher.Web
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          cd Decypher.Web
          dotnet test --no-build --configuration Release --verbosity normal || echo "No tests — skipping"

  # ── 2. Build .NET Docker → push to Artifact Registry → Cloud Run ──
  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repo (idempotent)
        run: |
          gcloud artifacts repositories create decypher \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="Decypher images" \
            --quiet 2>/dev/null || true

      - name: Build and push API image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/decypher/api"
          docker build \
            -f Decypher.Web/Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/decypher/api"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production" \
            --set-env-vars "Notifications__Provider=Stub" \
            --set-env-vars "AllowedOrigins=*" \
            --set-env-vars "ConnectionStrings__DefaultConnection=${{ secrets.SUPABASE_CONNECTION_STRING }}" \
            --set-env-vars "Jwt__Key=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "OpenAI__ApiKey=${{ secrets.OPENAI_API_KEY }}"

      - name: Print Cloud Run URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)"

  # ── 3. Build Angular → Firebase Hosting ───────────────────────
  deploy-frontend:
    name: Deploy Angular to Firebase
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: angular-frontend/package-lock.json

      - name: Install dependencies
        run: cd angular-frontend && npm ci

      - name: Build Angular
        run: |
          cd angular-frontend
          npx ng build --configuration=production --output-path=dist/decypher-frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: |
          cd Decypher.Web
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          cd Decypher.Web
          dotnet test --no-build --configuration Release --verbosity normal || echo "No test projects found — skipping"

name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/decypher

jobs:
  test:
    name: Test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: |
          cd Decypher.Web
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          cd Decypher.Web
          dotnet test --no-build --configuration Release --verbosity normal || echo "No test projects found — skipping"

  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Decypher.Web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Angular dist
        run: |
          cd angular-frontend
          docker build -f Dockerfile.build -o dist-export .

      - name: Build & push NGINX+frontend image
        run: |
          mkdir -p nginx/html
          cp -r angular-frontend/dist-export/. nginx/html/
          cat > nginx/Dockerfile <<'EOF'
          FROM nginx:1.25-alpine
          COPY nginx.prod.conf /etc/nginx/nginx.conf
          COPY html /usr/share/nginx/html
          EOF
          docker buildx build \
            --push \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ github.sha }} \
            ./nginx

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/decypher

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,OPENAI_API_KEY,SENDGRID_API_KEY
          script: |
            cd /opt/decypher
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull pinned-SHA images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}

            # Write env file (secrets injected via environment variables)
            cat > .env.prod <<ENV
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DB_CONNECTION_STRING=Host=db;Port=5432;Database=decypher;Username=decypher;Password=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            SENDGRID_API_KEY=${SENDGRID_API_KEY}
            PORT=8080
            ENV

            # Rolling restart
            docker compose -f docker-compose.prod.yml --env-file .env.prod --profile prod up -d --no-deps api nginx

            # Run DB migrations
            docker compose -f docker-compose.prod.yml --profile prod exec -T api \
              dotnet Decypher.Web.dll -- migrate || true

            # Clean up old images
            docker image prune -f

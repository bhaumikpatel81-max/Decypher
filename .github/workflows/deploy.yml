name: Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: backend-runtime
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: frontend-runtime
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache,mode=max

    - name: Deploy to Render (Backend)
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

    - name: Deploy to Render (Frontend)
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_FRONTEND_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

    - name: Verify deployment
      run: |
        echo "Backend deployed to: ${{ secrets.RENDER_BACKEND_URL }}"
        echo "Frontend deployed to: ${{ secrets.RENDER_FRONTEND_URL }}"
        
        # Health check
        for i in {1..30}; do
          if curl -f ${{ secrets.RENDER_BACKEND_URL }}/health; then
            echo "Backend is healthy!"
            break
          fi
          echo "Attempt $i/30 waiting for backend..."
          sleep 10
        done
